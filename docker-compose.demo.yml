services:
  finsight-demo:
    build: ./backend
    container_name: finsight-demo
    ports:
      - "8500:8500"
    volumes:
      - finsight_demo_data:/app/data
    environment:
      - DEMO_MODE=true
      - LOG_LEVEL=INFO
    command: >
      sh -c "python seed_demo.py && uvicorn app.main:app --host 0.0.0.0 --port 8500"

volumes:
  finsight_demo_data:
