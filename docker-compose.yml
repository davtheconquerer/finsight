services:
  finsight:
    build: ./backend
    network_mode: host
    container_name: finsight
    volumes:
      - finsight_data:/app/data
    environment:
      - JELLYFIN_URL=${JELLYFIN_URL:-http://localhost:8096}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY}
      - POLL_INTERVAL=${POLL_INTERVAL:-30}
    restart: unless-stopped

volumes:
  finsight_data:
