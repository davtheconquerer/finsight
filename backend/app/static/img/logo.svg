<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 60" width="150" height="60">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b85ff;stop-opacity:1" />
    </linearGradient>
    <clipPath id="right-curve">
      <path d="M0,8 Q0,0 8,0 H142 Q150,0 150,8 V52 Q150,60 142,60 H8 Q0,60 0,52 Z"/>
    </clipPath>
  </defs>

  <g clip-path="url(#right-curve)">
    <rect width="150" height="60" fill="#1a1b2e"/>
  </g>

  <!-- F letter -->
  <text x="20" y="42" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#grad)">F</text>

  <!-- S letter -->
  <text x="45" y="42" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#e0e0e0">S</text>

  <!-- Line chart icon -->
  <g transform="translate(90, 15)" stroke="#6c63ff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="0" y1="25" x2="10" y2="15"/>
    <line x1="10" y1="15" x2="20" y2="20"/>
    <line x1="20" y1="20" x2="30" y2="5"/>
    <circle cx="0" cy="25" r="2" fill="#6c63ff"/>
    <circle cx="10" cy="15" r="2" fill="#6c63ff"/>
    <circle cx="20" cy="20" r="2" fill="#6c63ff"/>
    <circle cx="30" cy="5" r="2" fill="#6c63ff"/>
  </g>
</svg>