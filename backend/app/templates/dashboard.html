{% extends "base.html" %}
{% block content %}
<div class="stats-grid">
    <div class="stat-card">
        <div class="label">Active Streams</div>
        <div class="value" id="stat-active">0</div>
    </div>
    <div class="stat-card">
        <div class="label">Total Users</div>
        <div class="value" id="stat-users">0</div>
    </div>
    <div class="stat-card">
        <div class="label">Total Media</div>
        <div class="value" id="stat-media">0</div>
    </div>
</div>

<div class="section">
    <h2>Currently Playing</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>User</th>
                    <th>Media</th>
                    <th>Device</th>
                    <th>Method</th>
                    <th>Transcode</th>
                </tr>
            </thead>
            <tbody id="active-sessions-body">
                <tr><td colspan="5" style="text-align:center;color:#666;padding:2rem;">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div class="section">
    <h2>Recent Activity</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>User</th>
                    <th>Media</th>
                    <th>Device</th>
                    <th>Duration</th>
                    <th>Method</th>
                </tr>
            </thead>
            <tbody id="history-body">
                <tr><td colspan="5" style="text-align:center;color:#666;padding:2rem;">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
